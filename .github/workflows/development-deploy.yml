name: Development Deploy

on:
  push:
    branches: [ "dev" ]

jobs:
    build:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v6
          with:
            context: .
            file: ./Dockerfile
            push: true
            tags: |
              ghcr.io/alexsandroocanha/golang-api-crud:latest
              ghcr.io/alexsandroocanha/golang-api-crud:${{ github.sha }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

    container-scan:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        contents: read
        packages: read
      steps:
        - name: Login to GitHub Container Registry
          uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Cache Trivy DB
          uses: actions/cache@v4
          with:
            path: ~/.cache/trivy
            key: trivy-db-${{ github.run_id }}
            restore-keys: |
              trivy-db-
    
        - name: Pull Docker image
          run: |
            IMAGE=ghcr.io/alexsandroocanha/golang-api-crud:${{ github.sha }}
            docker pull $IMAGE
    
        - name: Run Trivy scan
          # v0.36.0
          uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
          with:
            scan-type: image
            image-ref: ghcr.io/alexsandroocanha/golang-api-crud:${{ github.sha }}
            format: table
            exit-code: 1
            severity: CRITICAL,HIGH

    deploy:
      runs-on: ubuntu-latest
      needs: container-scan
      permissions:
        contents: read
      steps:
        - name: Checkout manifests repo
          uses: actions/checkout@v4
          with:
            repository: alexsandroocanha/Golang-Api-Crud-Manifests
            token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
            path: manifests

        - name: Update image tag in dev overlay
          working-directory: manifests/overlays/dev
          run: |
            curl -sLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/latest/download/kustomize_linux_amd64
            chmod +x kustomize
            ./kustomize edit set image ghcr.io/alexsandroocanha/golang-api-crud:${{ github.sha }}

        - name: Commit and push manifest update
          working-directory: manifests
          run: |
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add overlays/dev/kustomization.yaml
            git commit -m "deploy: golang-api-crud dev ${{ github.sha }}"
            git push
